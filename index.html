<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek 用量监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Google Fonts 移除（国内访问超时） */
:root{
  --bg:#0d0d1a;
  --surface:#14142a;
  --surface2:#1c1c3a;
  --accent:#4F6BED;
  --green:#34d399;
  --red:#ef4444;
  --text:#e8e8f0;
  --text-dim:#7a7a9a;
  --border:#1e1e3a;
  --orange:#f59e0b;
}
body{
  font-family:'Microsoft YaHei','PingFang SC','Microsoft Sans Serif',sans-serif;
  background:var(--bg);color:var(--text);
  overflow:hidden;height:100vh;user-select:none;
}
.titlebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;height:40px;
  background:var(--surface);border-bottom:1px solid var(--border);
  -webkit-app-region:drag;
}
.titlebar .logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.titlebar .logo svg{width:16px;height:16px}
.titlebar .logo span{color:var(--text-dim);font-weight:400}
.titlebar-actions{display:flex;gap:6px;-webkit-app-region:no-drag}
.titlebar-actions button{
  width:28px;height:28px;border-radius:8px;border:none;background:transparent;
  color:var(--text-dim);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.titlebar-actions button:hover{background:var(--surface2);color:var(--text)}
.titlebar-actions .close:hover{background:var(--red);color:#fff}
.content{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:calc(100vh - 40px);
  padding:6px 20px 10px;position:relative;
}
.main-number{
  font-size:56px;font-weight:900;letter-spacing:-2px;line-height:1;
  font-family:'Inter','Noto Sans SC',sans-serif;
  background:linear-gradient(135deg,#fff 0%,#818cf8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  transition:font-size 0.3s;
}
.main-number.small{font-size:40px}
.main-label{font-size:13px;color:var(--text-dim);margin-top:3px}
.detail-row{display:flex;gap:20px;margin-top:8px}
.detail-item{text-align:center;min-width:64px}
.detail-item .num{font-size:13px;font-weight:700;color:var(--text)}
.detail-item .lbl{font-size:10px;color:var(--text-dim);margin-top:1px}
.status-bar{
  display:flex;align-items:center;gap:8px;margin-top:10px;
  padding:5px 14px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:border-color 0.2s;
}
.status-bar:hover{border-color:var(--accent)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.4)}
.status-dot.err{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,0.3)}
.status-dot.proxy{background:var(--orange);box-shadow:0 0 6px rgba(245,158,11,0.4)}
.status-text{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proxy-badge{
  font-size:9px;padding:1px 6px;border-radius:4px;
  background:var(--surface2);color:var(--orange);
  border:1px solid rgba(245,158,11,0.2);margin-left:auto;flex-shrink:0;
}
.proxy-info{
  font-size:9px;color:var(--text-dim);opacity:0.5;
  margin-top:4px;text-align:center;
}
.proxy-info code{
  background:var(--surface2);padding:1px 5px;border-radius:3px;
  font-family:monospace;cursor:pointer;
}
.proxy-info code:hover{opacity:0.8}
.debug-msg{
  font-size:9px;color:var(--text-dim);opacity:0.35;
  margin-top:4px;font-family:monospace;text-align:center;
  max-width:340px;word-break:break-all;cursor:pointer;
}
.settings-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:10;
}
.settings-overlay.open{display:flex}
.settings-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:24px;width:88%;max-width:320px;
}
.settings-panel h3{font-size:16px;font-weight:700;margin-bottom:18px;text-align:center}
.settings-panel label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px}
.settings-panel input{
  width:100%;padding:10px 14px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-size:13px;font-family:monospace;
  outline:none;margin-bottom:14px;
}
.settings-panel input:focus{border-color:var(--accent)}
.settings-actions{display:flex;gap:10px;margin-top:6px}
.settings-actions button{
  padding:9px 20px;border-radius:8px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;
}
.btn-primary{background:var(--accent);color:#fff;flex:1}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:var(--surface2);color:var(--text-dim)}
.btn-secondary:hover{color:var(--text)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fadeIn 0.35s ease}
</style>
</head>
<body>

<div class="titlebar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4F6BED" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    DeepSeek <span>用量监控</span>
  </div>
  <div class="titlebar-actions">
    <button onclick="refreshData()" title="刷新">🔄</button>
    <button onclick="openSettings()" title="设置">⚙️</button>
    <button class="close" onclick="window.electronAPI.close()">✕</button>
  </div>
</div>

<div class="content">
  <div class="main-number" id="mainNum">—</div>
  <div class="main-label" id="mainLabel">等待配置</div>

  <div class="detail-row">
    <div class="detail-item"><div class="num" id="d1">—</div><div class="lbl" id="lbl1">-</div></div>
    <div class="detail-item"><div class="num" id="d2">—</div><div class="lbl" id="lbl2">-</div></div>
    <div class="detail-item"><div class="num" id="d3">—</div><div class="lbl" id="lbl3">-</div></div>
  </div>

  <div class="status-bar" onclick="openSettings()">
    <span class="status-dot err" id="statusDot"></span>
    <span class="status-text" id="statusText">点击设置 API Key</span>
    <span class="proxy-badge" id="proxyBadge" style="display:none">代理</span>
  </div>

  <div class="proxy-info" id="proxyInfo" style="display:none">
    将 API 地址设为 <code id="proxyUrl" onclick="copyProxyUrl()">http://localhost:3456</code> 即可自动追踪用量
  </div>

  <div class="debug-msg" id="debugMsg" title="点击复制" onclick="copyDebug()"></div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>⚙️ 设置</h3>
    <label>DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." spellcheck="false">
    <div class="settings-actions">
      <button class="btn-secondary" onclick="testConnection()">测试</button>
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div style="margin-top:12px;font-size:10px;color:var(--text-dim);opacity:0.6;text-align:center" id="testResult"></div>
    <div style="margin-top:6px;padding-top:10px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);opacity:0.5;text-align:center">
      代理端口: 3456 · 将 API Base URL 设为 <strong>http://localhost:3456</strong> 启用实时追踪
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const STATE = { apiKey: localStorage.getItem('ds_api_key') || '' };
let debug = '';

function fmt(n){
  if(n===null||n===undefined)return'—';
  if(n===0)return'0';
  if(n>=1e8)return(n/1e8).toFixed(1)+'亿';
  if(n>=1e4)return(n/1e4).toFixed(1)+'万';
  if(n>=1e3)return n.toLocaleString();
  return String(n);
}
function setStatus(cls, msg){
  $('statusDot').className='status-dot '+cls;
  $('statusText').textContent=msg;
}
function setDebug(t){debug=t; $('debugMsg').textContent=t}
function copyDebug(){if(debug)navigator.clipboard?.writeText(debug)}
function copyProxyUrl(){
  const url = 'http://localhost:3456';
  navigator.clipboard?.writeText(url);
  setDebug('已复制代理地址');
}

// ─── 代理轮询 ────────────────────────────────────
async function pollProxyStats(){
  try {
    const stats = await window.electronAPI.getProxyStats();
    if(stats.running && stats.totalRequests > 0){
      const total = stats.totalPromptTokens + stats.totalCompletionTokens;
      const numEl = $('mainNum');
      const lblEl = $('mainLabel');
      // 当有追踪数据时优先显示
      numEl.textContent = fmt(total);
      numEl.className = 'main-number' + (total>=10000?' small':'');
      lblEl.textContent = '代理追踪 · Token 总用量';
      $('d1').textContent = fmt(stats.totalPromptTokens);
      $('lbl1').textContent = '输入';
      $('d2').textContent = fmt(stats.totalCompletionTokens);
      $('lbl2').textContent = '输出';
      $('d3').textContent = fmt(stats.totalRequests);
      $('lbl3').textContent = '请求数';
      setStatus('proxy', '代理追踪中  |  ' + stats.totalRequests + ' 次请求');
      $('proxyBadge').style.display = '';
      return true;
    }
  } catch(e){}
  return false;
}

// ─── 刷新数据 ────────────────────────────────────
async function refreshData(){
  const key = STATE.apiKey;
  if(!key||key==='sk-'){
    $('mainNum').textContent='—'; $('mainNum').className='main-number';
    $('mainLabel').textContent='等待配置';
    $('d1').textContent='—'; $('lbl1').textContent='-';
    $('d2').textContent='—'; $('lbl2').textContent='-';
    $('d3').textContent='—'; $('lbl3').textContent='-';
    setStatus('err','点击设置 API Key');
    setDebug('');
    $('proxyBadge').style.display='none';
    return;
  }

  // 先尝试取代理数据
  const hasProxy = await pollProxyStats();
  if(hasProxy) {
    setDebug('代理实时追踪中');
    return;
  }

  setStatus('err','获取余额…');
  $('mainNum').textContent='…';
  setDebug('正在连接 DeepSeek API…');

  const res = await window.electronAPI.fetchAll(key);

  // 代理状态
  if(res.proxy && res.proxy.running){
    $('proxyInfo').style.display = '';
    $('proxyUrl').textContent = 'http://localhost:' + res.proxy.port;
  }

  // ── 显示余额数据 ──
  if(res.balance){
    const b = res.balance;
    if(b.total > 0){
      $('mainNum').textContent = '¥' + b.total.toFixed(2);
      $('mainNum').className = 'main-number';
    } else {
      $('mainNum').textContent = '¥0';
      $('mainNum').className = 'main-number';
    }
    $('mainLabel').textContent = '账户余额';

    $('d1').textContent = '¥' + b.total.toFixed(2);
    $('lbl1').textContent = '总额';
    $('d2').textContent = '¥' + (b.toppedUp||0).toFixed(2);
    $('lbl2').textContent = '充值';
    $('d3').textContent = '¥' + (b.granted||0).toFixed(2);
    $('lbl3').textContent = '赠送';

    const proxyHint = res.proxy && res.proxy.running ? ' | 代理已就绪' : '';
    setStatus('ok', '已连接' + proxyHint);
    setDebug(res.usageError || '');

  // ── 完全失败 ──
  } else {
    $('mainNum').textContent = '✕';
    $('mainNum').className = 'main-number';
    $('mainLabel').textContent = '获取数据失败';
    $('d1').textContent = '—'; $('lbl1').textContent = '-';
    $('d2').textContent = '—'; $('lbl2').textContent = '-';
    $('d3').textContent = '—'; $('lbl3').textContent = '-';
    setStatus('err', '错误: ' + (res.balanceError||'未知'));
    setDebug(res.balanceError||'');
    $('proxyBadge').style.display='none';
    $('proxyInfo').style.display='none';
  }
}

async function testConnection(){
  const key = $('apiKeyInput').value.trim();
  if(!key||key==='sk-'){ $('testResult').textContent='请输入 API Key'; return; }
  $('testResult').textContent='测试中…';
  const res = await window.electronAPI.fetchAll(key);
  if(res.balance){
    $('testResult').textContent='✅ 连接成功！余额: ¥'+res.balance.total.toFixed(2);
  } else {
    $('testResult').textContent='❌ 失败: '+(res.balanceError||'未知');
  }
}

function openSettings(){
  $('settingsOverlay').classList.add('open');
  $('apiKeyInput').value=STATE.apiKey; $('apiKeyInput').focus();
  $('testResult').textContent='';
}
function closeSettings(){$('settingsOverlay').classList.remove('open')}
function saveSettings(){
  STATE.apiKey=$('apiKeyInput').value.trim();
  localStorage.setItem('ds_api_key',STATE.apiKey);
  closeSettings(); refreshData();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSettings();
  if(e.key==='Enter'&&$('settingsOverlay').classList.contains('open'))saveSettings();
});

// ─── 启动 ────────────────────────────────────────
if(STATE.apiKey) refreshData();
else setStatus('err','点击设置 API Key');

// 自动刷新：30 秒轮询代理 + API
setInterval(async () => {
  const hasProxy = await pollProxyStats();
  if(!hasProxy && STATE.apiKey) refreshData();
}, 30000);

// 代理状态快速轮询（检测新请求）
setInterval(pollProxyStats, 3000);
</script>
</body>
</html>
